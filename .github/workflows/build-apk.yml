name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/googlechromelabs/bubblewrap:latest
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run build and capture full log
        shell: bash
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.BUBBLEWRAP_KEYSTORE_PASSWORD || 'flmTempPass2026!' }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.BUBBLEWRAP_KEY_PASSWORD || 'flmTempPass2026!' }}
        run: |
          set -x
          LOG=/tmp/build-log.txt
          exec > >(tee -a "$LOG") 2>&1

          echo "=== Step: verify manifest reachable ==="
          curl -sf "https://fear-less-maths-ratx69zligsaxwtsudwppa.streamlit.app/app/static/manifest.json" -o /tmp/manifest.json
          cat /tmp/manifest.json
          curl -sfI "https://fear-less-maths-ratx69zligsaxwtsudwppa.streamlit.app/app/static/icon-512.png" | head -5

          echo "=== Step: generate signing keystore ==="
          keytool -genkeypair -v \
            -keystore /tmp/android.keystore \
            -alias flm-key \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$BUBBLEWRAP_KEYSTORE_PASSWORD" \
            -keypass "$BUBBLEWRAP_KEY_PASSWORD" \
            -dname "CN=Fear Less Maths, OU=IDPS Singarayakonda, O=LA Excellence Schools, L=Singarayakonda, ST=Andhra Pradesh, C=IN"

          echo "=== Step: bubblewrap doctor ==="
          bubblewrap doctor || true

          echo "=== Step: bubblewrap init ==="
          mkdir -p /tmp/twa-project
          cd /tmp/twa-project
          { \
            echo "com.idps.fearlessmaths"; \
            for i in $(seq 1 30); do echo ""; done; \
            echo "Fear Less Maths"; \
            echo "IDPS Singarayakonda"; \
            echo "Singarayakonda"; \
            echo "Andhra Pradesh"; \
            echo "IN"; \
            echo "$BUBBLEWRAP_KEYSTORE_PASSWORD"; \
            echo "$BUBBLEWRAP_KEY_PASSWORD"; \
            for i in $(seq 1 10); do echo ""; done; \
          } | bubblewrap init --manifest="https://fear-less-maths-ratx69zligsaxwtsudwppa.streamlit.app/app/static/manifest.json"
          INIT_EXIT=$?
          echo "init exit code: $INIT_EXIT"
          echo "--- twa-project directory after init ---"
          ls -la /tmp/twa-project
          if [ -f /tmp/twa-project/twa-manifest.json ]; then
            echo "--- twa-manifest.json ---"
            cat /tmp/twa-project/twa-manifest.json
          fi

          echo "=== Step: bubblewrap build ==="
          if [ -f /tmp/twa-project/twa-manifest.json ]; then
            cd /tmp/twa-project
            bubblewrap build --skipPwaValidation
            echo "build exit code: $?"
          else
            echo "SKIPPED — no twa-manifest.json (init did not complete)"
          fi

          echo "=== Step: search for output files ==="
          find /tmp/twa-project -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null
          echo "=== Full twa-project listing ==="
          find /tmp/twa-project -maxdepth 4 2>/dev/null

      - name: Commit log and any APK back to the repo
        if: always()
        shell: bash
        run: |
          mkdir -p ci-logs
          cp /tmp/build-log.txt ci-logs/build-apk-log.txt || echo "no log found" > ci-logs/build-apk-log.txt
          APK=$(find /tmp/twa-project -type f -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ci-logs/fear-less-maths.apk
            echo "APK committed: $APK"
          else
            echo "No APK was produced." > ci-logs/no-apk-produced.txt
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add ci-logs/
          git commit -m "CI: build-apk run output [skip ci]" || echo "nothing to commit"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main

